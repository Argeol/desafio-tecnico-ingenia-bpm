<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio EDUCIT</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .user-card { border-bottom: 1px solid #ddd; padding: 10px 0; }
        .user-card:last-child { border-bottom: none; }
        
        /* Bug 1: El botón no toma los estilos por un error tipográfico */
        .btn-primary { 
            background-color: #0056b3; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Directorio de Estudiantes EDUCIT</h2>
    
    <button class="btn-primary" onclick="loadUsers()">Cargar Usuarios</button>
    <input  type="text"
            id="searchInput" 
            placeholder="Buscar por nombre..." 
            oninput="filterUsers()" 
            style="width: 100%; padding: 8px; margin-bottom: 10px;">

    <div id="userList">Los usuarios aparecerán aquí...</div>
</div>

<script>
    // Tarea 3 (Lógica SQL): Corrige esta consulta para insertar un usuario.
    // Consulta actual: INSERT INTO estudiantes (nombre, correo) VALUES (userName);
    // Tu corrección: 
    // Corrección 1 (Recomendada - Consulta parametrizada, evita SQL Injection):
    // INSERT INTO estudiantes (nombre, correo)
    // VALUES (@userName, @email);

    // Corrección 2 (Consulta Preparada):
    // INSERT INTO estudiantes (nombre, correo)
    // VALUES (?, ?);

    // Corrección 3 (SQL puro con valores literales:
    // INSERT INTO estudiantes (nombre, correo)
    // VALUES ('Juan Pérez', 'juan@email.com');

    
    let allUsers = [];
    function loadUsers() {
        const userList = document.getElementById('userList');
        userList.innerHTML = 'Cargando...';
        fetch('https://jsonplaceholder.typicode.com/users')
            .then(response => response.json())
            .then(users => {
                allUsers = users
                renderUser(allUsers)
        })
            .catch(error => {
                userList.innerHTML = 'Error al cargar los usuarios.';
                console.error(error);
            });
    }
    function filterUsers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allUsers.filter(user => user.name.toLowerCase().includes(searchTerm));
            renderUser(filtered);
    }
    function renderUser(users){
            const userList = document.getElementById('userList');
            userList.innerHTML = '';
            users.forEach(user => {
                const div = document.createElement('div');
                div.className = 'user-card';
                // SOLUCIÓN BUG 2: Las propiedades correctas en JSONPlaceholder son 'name' y 'email'
                div.innerHTML = `<strong>${user.name}</strong> - ${user.email}`;
                userList.appendChild(div);
            }); 
    }
</script>

</body>
</html>
